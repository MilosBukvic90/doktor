<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicinska Ordinacija</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- NAV -->
    <nav>
        <h1>MediCare</h1>
        <ul>
            <li><a href="index.html">Početna</a></li>
            <li><a href="usluge.html">Usluge</a></li>
            <li><a href="kontakt.html">Zakazivanje</a></li>
        </ul>
    </nav>

    <main>
        <!-- HERO -->
        <header>
            <div class="overlay">
                <h2>Zdravlje je prioritet,</h2>
                <p>Zakažite pregled sada</p>
                <button id="openForm">Zakažite pregled</button>
            </div>
        </header>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">

            <span id="closeModal">&times;</span>

<h2>Zakazivanje termina</h2>

            <form>
                <input type="text" placeholder="Ime" required>
                <input type="email" placeholder="Email" required>
                <button type="submit">Pošalji</button>
            </form>

        </div>
    </div>

    <div id="sidebar" class="sidebar">

        <span id="closeSidebar">&times;</span>

        <h2>Zakazivanje termina</h2>

        <form>
            <input type="text" placeholder="Ime" required>
            <input type="email" placeholder="Email" required>
            <button type="submit">Pošalji</button>
        </form>

    </div>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 MediCare - Medicinska Ordinacija</p>
    <script>
        const openBtn = document.getElementById("openForm");
        const sidebar = document.getElementById("sidebar");
        const closeBtn = document.getElementById("closeSidebar");

        // otvori sidebar
        openBtn.onclick = function () {
            sidebar.classList.add("active");
        }

        // zatvori sidebar
        closeBtn.onclick = function () {
            sidebar.classList.remove("active");
        }
    </script>
</body>

</html>
